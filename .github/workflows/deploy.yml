name: Deploy to MonsterASP

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite ejecución manual desde GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Validate required deployment secrets
      shell: bash
      env:
        CONNECTIONSTRINGS__DEFAULTCONNECTION: ${{ secrets.CONNECTIONSTRINGS__DEFAULTCONNECTION }}
        JWT__SECRETKEY: ${{ secrets.JWT__SECRETKEY }}
      run: |
        if [ -z "$CONNECTIONSTRINGS__DEFAULTCONNECTION" ]; then
          echo "Missing required GitHub secret: CONNECTIONSTRINGS__DEFAULTCONNECTION"
          exit 1
        fi

        if [ -z "$JWT__SECRETKEY" ]; then
          echo "Missing required GitHub secret: JWT__SECRETKEY"
          exit 1
        fi

    - name: Publish
      run: dotnet publish src/RncPlatform.Api/RncPlatform.Api.csproj -c Release -o ./publish --no-build

    - name: Remove development-only configuration from publish output
      shell: bash
      run: rm -f ./publish/appsettings.Development.json

    - name: App Settings Variable Substitution
      uses: microsoft/variable-substitution@v1
      with:
        files: './publish/appsettings.json'
      env:
        # Los nombres deben coincidir exactamente con la estructura del JSON
        ConnectionStrings.DefaultConnection: ${{ secrets.CONNECTIONSTRINGS__DEFAULTCONNECTION }}
        ConnectionStrings.Valkey: ${{ secrets.CONNECTIONSTRINGS__VALKEY }}
        Jwt.SecretKey: ${{ secrets.JWT__SECRETKEY }}
        Worker.Enabled: 'true'
        Worker.RunHourUtc: '4'

    - name: Prepare maintenance marker for locked IIS files
      shell: bash
      run: |
        mkdir -p ./deploy-control ./deploy-control-empty
        cat > ./deploy-control/app_offline.htm <<'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="utf-8" />
          <title>RncPlatform maintenance</title>
        </head>
        <body>
          <h1>RncPlatform is being updated</h1>
          <p>Please try again in a couple of minutes.</p>
        </body>
        </html>
        EOF
        cp ./deploy-control/app_offline.htm ./publish/app_offline.htm

    - name: Put app offline before replacing DLLs
      uses: SamKirkland/FTP-Deploy-Action@v4.3.6
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT || 21 }}
        local-dir: ./deploy-control/
        server-dir: /wwwroot/
        state-name: .ftp-deploy-offline-state.json

    - name: Wait for application shutdown
      shell: bash
      run: sleep 10

    - name: 🚀 Deploy via FTP to MonsterASP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.6
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT || 21 }}
        local-dir: ./publish/
        server-dir: /wwwroot/
        # Guardar el estado ayuda a que los despliegues futuros sean más rápidos
        state-name: .ftp-deploy-sync-state.json

    - name: Remove maintenance marker after successful deploy
      if: ${{ success() }}
      uses: SamKirkland/FTP-Deploy-Action@v4.3.6
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT || 21 }}
        local-dir: ./deploy-control-empty/
        server-dir: /wwwroot/
        state-name: .ftp-deploy-offline-state.json
